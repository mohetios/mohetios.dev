mutation UpdateInboxMessageStatus($input: UpdateInboxMessageStatusInput!) {
  updateInboxMessageStatus(input: $input) {
    id
    source
    status
    kind
    priority
    senderName
    senderEmail
    senderCompany
    senderWebsite
    subject
    preview
    bodyText
    bodyHtml
    createdAt
    updatedAt
    lastActivityAt
  }
}
