query InboxMessage($id: ID!) {
  inboxMessage(id: $id) {
    id
    source
    status
    kind
    priority
    senderName
    senderEmail
    senderCompany
    senderWebsite
    subject
    preview
    bodyText
    bodyHtml
    createdAt
    updatedAt
    lastActivityAt
    replies {
      id
      fromEmail
      toEmail
      subject
      bodyText
      status
      error
      createdAt
      sentAt
    }
  }
}
